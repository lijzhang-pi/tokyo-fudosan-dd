<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>东京·此刻 — tokyo-china.com</title>
<meta name="description" content="东京此刻的光、季节与一句诗。一个安静的角落。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root{ --fg:#fff; --fg-soft:rgba(255,255,255,.78); --fg-faint:rgba(255,255,255,.5); }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif SC","Noto Serif JP",serif;
    color:var(--fg);
    background:#0b1126;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  #sky{position:fixed;inset:0;z-index:0;transition:background 4s linear;}
  #veil{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 18%, transparent 40%, rgba(0,0,0,.28) 100%);}
  canvas{position:fixed;inset:0;z-index:2;display:block;}
  .stage{
    position:fixed;inset:0;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:7vh 26px calc(7vh + env(safe-area-inset-bottom));
    gap:0;
  }
  .greet{
    font-size:clamp(15px,4.2vw,19px);letter-spacing:.32em;
    color:var(--fg-soft);font-weight:300;margin-bottom:26px;
    opacity:0;animation:rise 1.6s .2s ease forwards;
  }
  .greet .dot{opacity:.5;margin:0 .5em;}
  .clock{
    font-variant-numeric:tabular-nums;font-weight:300;
    font-size:clamp(58px,19vw,140px);line-height:1;letter-spacing:.02em;
    text-shadow:0 2px 40px rgba(0,0,0,.25);
    opacity:0;animation:rise 1.8s .35s ease forwards;
  }
  .clock .sec{font-size:.34em;opacity:.55;letter-spacing:.04em;margin-left:.18em;font-weight:300;}
  .meta{
    margin-top:22px;font-size:clamp(13px,3.6vw,16px);letter-spacing:.18em;
    color:var(--fg-soft);font-weight:300;
    opacity:0;animation:rise 1.8s .5s ease forwards;
  }
  .meta .sep{opacity:.45;margin:0 .7em;}
  .rule{width:46px;height:1px;background:var(--fg-faint);margin:40px 0 34px;
    opacity:0;animation:grow 2s .8s ease forwards;}
  .poem{max-width:24em;opacity:0;animation:rise 2s 1s ease forwards;}
  .poem .zh{font-size:clamp(19px,5.2vw,26px);font-weight:400;line-height:1.85;letter-spacing:.06em;}
  .poem .ja{margin-top:12px;font-family:"Noto Serif JP",serif;font-weight:300;
    font-size:clamp(13px,3.6vw,16px);letter-spacing:.1em;color:var(--fg-faint);line-height:1.8;}
  .sign{
    position:fixed;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));z-index:3;
    text-align:center;font-size:11.5px;letter-spacing:.26em;color:var(--fg-faint);
    font-weight:300;opacity:0;animation:rise 2.4s 1.6s ease forwards;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @keyframes grow{from{opacity:0;transform:scaleX(.2);}to{opacity:1;transform:none;}}
  /* 呼吸 */
  .breathe{animation:rise 1.8s .35s ease forwards, breathe 7s 2.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{filter:brightness(1);}50%{filter:brightness(1.08);}}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.6s !important;animation-iteration-count:1 !important;}
    #sky{transition:none;}
  }
</style>
</head>
<body>
  <div id="sky"></div>
  <canvas id="c"></canvas>
  <div id="veil"></div>

  <div class="stage">
    <div class="greet" id="greet">　</div>
    <div class="clock breathe"><span id="hm">--:--</span><span class="sec" id="sec"></span></div>
    <div class="meta" id="meta">　</div>
    <div class="rule"></div>
    <div class="poem">
      <div class="zh" id="pzh">　</div>
      <div class="ja" id="pja">　</div>
    </div>
  </div>
  <div class="sign">tokyo-china.com　·　一个安静的角落</div>

<script>
(function(){
  "use strict";
  var reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  var qs = new URLSearchParams(location.search);

  // ---- 东京时间 ----
  function tokyoNow(){
    var d = new Date();
    if(qs.has("hour")){ // 调试用：?hour=20
      d.setHours(parseInt(qs.get("hour"),10)||0, parseInt(qs.get("min")||"24",10), 0);
      return {d:d, h:d.getHours()+d.getMinutes()/60, hh:d.getHours(), mm:d.getMinutes(), ss:d.getSeconds(),
              mon:(parseInt(qs.get("mon")||(d.getMonth()+1),10)), date:d.getDate(), dow:d.getDay()};
    }
    var p = new Intl.DateTimeFormat("zh-CN",{timeZone:"Asia/Tokyo",hour:"2-digit",minute:"2-digit",
      second:"2-digit",hour12:false,year:"numeric",month:"numeric",day:"numeric",weekday:"short"}).formatToParts(d);
    var o={}; p.forEach(function(x){o[x.type]=x.value;});
    var hh=parseInt(o.hour,10)%24, mm=parseInt(o.minute,10), ss=parseInt(o.second,10);
    var dowMap={"周日":0,"周一":1,"周二":2,"周三":3,"周四":4,"周五":5,"周六":6};
    return {h:hh+mm/60, hh:hh, mm:mm, ss:ss, mon:parseInt(o.month,10), date:parseInt(o.day,10),
            dow:dowMap[o.weekday]!=null?dowMap[o.weekday]:new Date().getDay(), year:parseInt(o.year,10)};
  }

  // ---- 时段天色（关键帧插值） ----
  var KEYS=[ // h, 顶色, 底色, 星亮度
    {h:0,  top:[7,11,24],   bot:[16,24,46],  star:1.0},
    {h:5,  top:[28,35,64],  bot:[233,169,139],star:.35},
    {h:7,  top:[111,180,230],bot:[234,245,252],star:0},
    {h:12, top:[132,194,239],bot:[241,248,253],star:0},
    {h:16, top:[169,198,230],bot:[255,217,168],star:0},
    {h:18, top:[90,74,120], bot:[243,160,106], star:.12},
    {h:20, top:[11,17,38],  bot:[26,35,64],   star:.75},
    {h:24, top:[7,11,24],   bot:[16,24,46],   star:1.0}
  ];
  function lerp(a,b,t){return a+(b-a)*t;}
  function mix(c1,c2,t){return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];}
  function rgb(c){return "rgb("+c[0]+","+c[1]+","+c[2]+")";}
  function palette(h){
    for(var i=0;i<KEYS.length-1;i++){
      if(h>=KEYS[i].h && h<=KEYS[i+1].h){
        var t=(h-KEYS[i].h)/(KEYS[i+1].h-KEYS[i].h);
        return {top:mix(KEYS[i].top,KEYS[i+1].top,t), bot:mix(KEYS[i].bot,KEYS[i+1].bot,t),
                star:lerp(KEYS[i].star,KEYS[i+1].star,t)};
      }
    }
    return {top:KEYS[0].top,bot:KEYS[0].bot,star:KEYS[0].star};
  }

  // ---- 季节 ----
  function seasonOf(mon){ if(mon>=3&&mon<=5)return"spring"; if(mon>=6&&mon<=8)return"summer"; if(mon>=9&&mon<=11)return"autumn"; return"winter"; }
  var SEASON_CN={spring:"春",summer:"夏",autumn:"秋",winter:"冬"};

  // ---- 每日之诗 ----
  var POEMS=[
    {zh:"慢一点，风也在等你。", ja:"ゆっくりでいい、風も待っている。"},
    {zh:"今天，也好好地过完它。", ja:"今日も、ちゃんと生きていく。"},
    {zh:"花开的时候，记得抬头。", ja:"花の咲くころ、空を見上げて。"},
    {zh:"两座城之间，你也是一座桥。", ja:"二つの街のあいだ、君も橋になる。"},
    {zh:"夜深了，有一盏灯亮着，就够了。", ja:"夜更けでも、灯りが一つあれば十分。"},
    {zh:"古池塘，青蛙跃入，水之音。", ja:"古池や 蛙飛びこむ 水の音"},
    {zh:"再远的远方，今晚也是同一个月亮。", ja:"どんなに遠くても、今夜の月は同じ。"},
    {zh:"走得慢的人，看见的花更多。", ja:"ゆっくり歩く人ほど、たくさんの花を見る。"},
    {zh:"闲坐听雨，也是一件正经事。", ja:"雨の音を聞くのも、立派な用事。"},
    {zh:"幽寂啊，蝉声渗入了山岩。", ja:"閑かさや 岩にしみ入る 蝉の声"},
    {zh:"愿你今天，被温柔地对待。", ja:"今日も、やさしくされますように。"},
    {zh:"季节会替我们，记住每一年。", ja:"季節が、毎年を覚えていてくれる。"},
    {zh:"无论在哪里，好好吃饭，好好睡觉。", ja:"どこにいても、よく食べ、よく眠る。"},
    {zh:"风停了，心也跟着静下来。", ja:"風がやんで、心も静かになる。"}
  ];
  function dayIndex(t){ var ref=new Date(2026,0,1); var now=new Date(t.year||2026,(t.mon||1)-1,t.date||1);
    return Math.floor((now-ref)/86400000); }

  // ---- 问候 ----
  function greet(h){
    if(h>=5&&h<11) return ["晨安","おはよう"];
    if(h>=11&&h<17) return ["午安","こんにちは"];
    if(h>=17&&h<22) return ["晚上好","こんばんは"];
    return ["夜安","おやすみ"];
  }

  // ---- 画布：星 + 季节粒子 ----
  var cv=document.getElementById("c"), cx=cv.getContext("2d"), W,H,DPR;
  function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR; cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; initStars(); }
  var stars=[];
  function initStars(){ stars=[]; var n=Math.round((W*H)/(14000*DPR)); for(var i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H*0.7,r:(Math.random()*1.1+.3)*DPR,p:Math.random()*6.28,s:Math.random()*0.8+0.3}); }

  var season, particles=[], TAU=6.283185;
  function makeParticles(){
    particles=[];
    var base = reduce?22:54;
    for(var i=0;i<base;i++) particles.push(spawn(true));
  }
  function spawn(rand){
    var x=Math.random()*W, y=rand?Math.random()*H:-20*DPR;
    var sp={x:x,y:y,a:Math.random()*TAU,t:Math.random()};
    if(season==="spring"){ sp.size=(Math.random()*5+5)*DPR; sp.vy=(Math.random()*.5+.35)*DPR; sp.vx=(Math.random()*.5-.1)*DPR; sp.sway=Math.random()*1.2+.4; }
    else if(season==="summer"){ sp.size=(Math.random()*2.4+1.4)*DPR; sp.vy=(Math.random()*.25-.12)*DPR; sp.vx=(Math.random()*.25-.12)*DPR; sp.pulse=Math.random()*TAU; }
    else if(season==="autumn"){ sp.size=(Math.random()*6+6)*DPR; sp.vy=(Math.random()*.6+.45)*DPR; sp.vx=(Math.random()*.7-.2)*DPR; sp.spin=(Math.random()*.04-.02); sp.hue=Math.random(); }
    else { sp.size=(Math.random()*3+1.6)*DPR; sp.vy=(Math.random()*.5+.3)*DPR; sp.vx=(Math.random()*.3-.15)*DPR; sp.sway=Math.random()*1.0+.3; }
    return sp;
  }
  function draw(now){
    cx.clearRect(0,0,W,H);
    // 星
    if(curStar>0.02){
      for(var i=0;i<stars.length;i++){var s=stars[i];var tw=0.6+0.4*Math.sin(now*0.001*s.s+s.p);
        cx.globalAlpha=curStar*tw; cx.fillStyle="#fff"; cx.beginPath(); cx.arc(s.x,s.y,s.r,0,TAU); cx.fill();}
    }
    cx.globalAlpha=1;
    // 粒子
    for(var j=0;j<particles.length;j++){ var p=particles[j];
      p.y+=p.vy; p.a+=0.01;
      if(season==="spring"){ p.x+=p.vx+Math.sin(p.a)*p.sway*DPR*0.4; drawPetal(p); }
      else if(season==="summer"){ p.x+=p.vx+Math.sin(p.a*0.7)*DPR*0.3; p.y+=Math.sin(p.a*1.1)*DPR*0.2; drawFly(p,now); }
      else if(season==="autumn"){ p.x+=p.vx+Math.sin(p.a)*DPR*0.6; p.a+=p.spin; drawLeaf(p); }
      else { p.x+=p.vx+Math.sin(p.a)*p.sway*DPR*0.3; drawSnow(p); }
      if(p.y>H+30*DPR || p.x<-40*DPR || p.x>W+40*DPR){ particles[j]=spawn(false); }
    }
    raf=requestAnimationFrame(draw);
  }
  function drawPetal(p){ cx.save();cx.translate(p.x,p.y);cx.rotate(p.a);cx.globalAlpha=.82;
    cx.fillStyle="rgba(255,210,224,.9)"; cx.beginPath();
    cx.ellipse(0,0,p.size*0.5,p.size,0,0,TAU); cx.fill();
    cx.fillStyle="rgba(255,182,205,.7)"; cx.beginPath(); cx.ellipse(0,p.size*0.15,p.size*0.28,p.size*0.55,0,0,TAU);cx.fill(); cx.restore(); }
  function drawFly(p,now){ var g=0.45+0.55*Math.abs(Math.sin(now*0.002+p.pulse)); cx.save();cx.globalAlpha=g;
    var grd=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4); grd.addColorStop(0,"rgba(214,255,180,.95)"); grd.addColorStop(.4,"rgba(190,236,140,.5)"); grd.addColorStop(1,"rgba(190,236,140,0)");
    cx.fillStyle=grd; cx.beginPath();cx.arc(p.x,p.y,p.size*4,0,TAU);cx.fill();
    cx.globalAlpha=g;cx.fillStyle="#f4ffd6";cx.beginPath();cx.arc(p.x,p.y,p.size*0.7,0,TAU);cx.fill(); cx.restore(); }
  function drawLeaf(p){ var cols=[[201,87,62],[214,140,51],[176,77,55],[191,108,40]]; var c=cols[Math.floor(p.hue*cols.length)%cols.length];
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.a);cx.globalAlpha=.85;cx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+",.9)";
    cx.beginPath();cx.ellipse(0,0,p.size*0.45,p.size,0,0,TAU);cx.fill();
    cx.strokeStyle="rgba(90,40,20,.35)";cx.lineWidth=Math.max(1,p.size*0.06);cx.beginPath();cx.moveTo(0,-p.size);cx.lineTo(0,p.size);cx.stroke();cx.restore(); }
  function drawSnow(p){ cx.save();cx.globalAlpha=.85;cx.fillStyle="rgba(255,255,255,.92)";cx.beginPath();cx.arc(p.x,p.y,p.size,0,TAU);cx.fill();cx.restore(); }

  // ---- 渲染主信息 + 天色 ----
  var curStar=0;
  function setSky(){
    var t=tokyoNow(); var pal=palette(t.h); curStar=pal.star;
    document.getElementById("sky").style.background="linear-gradient(180deg,"+rgb(pal.top)+" 0%,"+rgb(pal.bot)+" 100%)";
    // 文字在亮天色时转深色
    var bright=(pal.bot[0]+pal.bot[1]+pal.bot[2])/3;
    var dark = bright>175 && t.h>6.5 && t.h<17.5;
    document.documentElement.style.setProperty("--fg", dark?"#26313f":"#ffffff");
    document.documentElement.style.setProperty("--fg-soft", dark?"rgba(38,49,63,.8)":"rgba(255,255,255,.78)");
    document.documentElement.style.setProperty("--fg-faint", dark?"rgba(38,49,63,.5)":"rgba(255,255,255,.5)");
  }
  var lastSeason="";
  function tick(){
    var t=tokyoNow();
    var g=greet(t.h);
    document.getElementById("greet").innerHTML=g[0]+'<span class="dot">·</span>'+g[1];
    document.getElementById("hm").textContent=("0"+t.hh).slice(-2)+":"+("0"+t.mm).slice(-2);
    document.getElementById("sec").textContent=("0"+t.ss).slice(-2);
    var dows=["日","一","二","三","四","五","六"];
    var s=seasonOf(t.mon);
    document.getElementById("meta").innerHTML=(t.mon)+"月"+t.date+"日<span class='sep'>·</span>周"+dows[t.dow]+"<span class='sep'>·</span>"+SEASON_CN[s]+"日的东京";
    var pm=POEMS[((dayIndex(t)%POEMS.length)+POEMS.length)%POEMS.length];
    document.getElementById("pzh").textContent=pm.zh;
    document.getElementById("pja").textContent=pm.ja;
    setSky();
    if(s!==lastSeason){ lastSeason=s; season=s; makeParticles(); }
  }

  var raf;
  function start(){ resize(); tick(); setInterval(tick,1000); if(!reduce){ raf=requestAnimationFrame(draw);} else { draw(performance.now()); } }
  addEventListener("resize",function(){clearTimeout(window.__rz);window.__rz=setTimeout(resize,200);});
  document.fonts&&document.fonts.ready.then(function(){});
  start();
})();
</script>
</body>
</html>
